##### Application properties #####
app.name=@project.name@
app.desc=@project.description@
app.version=@project.version@
app.url=${APP_URL:http://localhost:8080}
app.dev-name=John Doe
app.dev-email=dumy@dumy
app.upload.dir=uploads/avatars

##### SPRING AVATAR PROPERTIES #####
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB

##### SPRING DOC PROPERTIES #####
springdoc.packages-to-scan=ar.edu.utn.frc.tup.piii.controllers
springdoc.show-actuator=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=/swagger-ui.html

## Docker ##
spring.docker.compose.enabled=false

## Spring Data Source ##
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

## Spring JPA ##
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

## Flyway ##
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

## Logging ##
logging.level.root=WARN
logging.level.ar.edu.utn.frc.tup.piii.engine.GameEngine=INFO
logging.level.ar.edu.utn.frc.tup.piii.services.cards.CardCatalogService=INFO

## JWT ##
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000